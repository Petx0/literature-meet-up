<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Literature Meet Up — Character Encounters</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>
  <main>
    <h1>Literature Meet Up</h1>
    <p class="subtitle">Find characters from different novels who could have crossed paths.</p>

    <div class="controls">
      <label for="time-select">Time overlap</label>
      <select id="time-select">
        <option value="none">No time filter</option>
        <option value="century">Same century</option>
        <option value="decade">Same decade</option>
        <option value="year" selected>Same year</option>
        <option value="month">Same month</option>
        <option value="day">Same day</option>
      </select>

      <label for="location-select">Location overlap</label>
      <select id="location-select">
        <option value="none">No location filter</option>
        <option value="country">Same country</option>
        <option value="region">Same region</option>
        <option value="city" selected>Same city</option>
        <option value="neighborhood">Same neighbourhood</option>
      </select>

      <label for="country-select">Country</label>
      <select id="country-select">
        <option value="" selected>Any country</option>
      </select>

      <button id="find-btn">Find an encounter</button>
    </div>

    <div id="result"></div>
    <div id="map"></div>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
